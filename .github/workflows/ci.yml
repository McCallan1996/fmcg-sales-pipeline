name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform/

      - name: Terraform init
        run: cd terraform && terraform init -backend=false

      - name: Terraform validate
        run: cd terraform && terraform validate

  lint-dbt:
    name: Lint dbt models
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Lint SQL
        run: |
          cd dbt
          uvx sqlfluff lint models/ \
            --dialect bigquery \
            --exclude-rules LT05,AM04,ST06,RF04,LT02 \
            --ignore templating

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Check formatting
        run: uvx ruff check airflow/ spark/

  docker-build:
    name: Verify Docker builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Airflow image
        run: docker build -t fmcg-airflow airflow/
